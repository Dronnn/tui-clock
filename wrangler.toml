# Cloudflare configuration for deploying this static site.
#
# This is a plain static site (HTML/CSS/JS, no build step), served as a Worker
# with Static Assets — the project's deploy command is `npx wrangler deploy`.
# `assets.directory = "./"` makes the repo root the served asset directory, so
# index.html is the site root. No Worker script (`main`) is needed.
#
# `name` must match the Cloudflare project/worker name so the deploy updates the
# existing "clock" worker (and its clock.mrmaier.com domain).

name = "clock"
compatibility_date = "2025-11-01"

[assets]
directory = "./"
